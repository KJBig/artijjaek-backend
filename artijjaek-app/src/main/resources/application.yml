spring:
  config:
    import:
      - db-main.yml
      - ai-main.yml
      - common-main.yml
      - webhook-main.yml
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: ${SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${SMTP_TIMEOUT:5000}
          writetimeout: ${SMTP_WRITE_TIMEOUT:5000}
          pool: ${SMTP_POOL_ENABLED:true}
          poolSize: ${SMTP_POOL_SIZE:20}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
